apiVersion: apps/v1
kind: Deployment
metadata:
  name: agroconecta-backend-deployment
  namespace: agroconecta
  labels:
    app: agroconecta-backend
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: agroconecta-backend
  template:
    metadata:
      labels:
        app: agroconecta-backend
    spec:
      containers:
        - name: agroconecta-backend
          # Sustituir por la imagen publicada en el registro (ver .github/workflows/deploy.yml)
          image: ghcr.io/tu-usuario/agroconecta-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: agroconecta-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: agroconecta-secrets
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: agroconecta-secrets
                  key: JWT_SECRET
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
